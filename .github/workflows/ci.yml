name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Format check
        run: terraform fmt -check -recursive

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Init (backend=false)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  terraform-docs:
    name: Terraform Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check terraform-docs
        uses: terraform-docs/gh-actions@v1.6.0
        with:
          working-dir: .
          output-method: print
          output-file: README.md
          output-file-mode: inject
          git-push: false

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint -f compact
